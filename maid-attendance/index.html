<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maid Attendance Tracker</title>
    <meta name="description"
        content="Track maid attendance, calculate per-day cost, and manage payments for multiple persons.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Floating particles background -->
    <div class="particles" id="particles"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                </div>
                <div>
                    <h1>Maid Attendance</h1>
                    <p class="subtitle">Track visits & payments</p>
                </div>
            </div>
            <div class="header-right">
                <div class="month-nav">
                    <button class="nav-arrow" id="prev-month" title="Previous Month">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6" />
                        </svg>
                    </button>
                    <button class="month-display" id="month-display" title="Select Month"></button>
                    <button class="nav-arrow" id="next-month" title="Next Month">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6" />
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Add Person Section -->
        <section class="add-person-section">
            <div class="add-person-card">
                <input type="text" id="person-name-input" placeholder="Enter person's name..." autocomplete="off">
                <button class="add-btn" id="add-person-btn" title="Add Person">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    <span>Add Person</span>
                </button>
            </div>
        </section>

        <!-- Grand Total Summary -->
        <section class="grand-total-section" id="grand-total-section" style="display:none;">
            <div class="grand-total-card">
                <div class="grand-total-header">
                    <div class="grand-total-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="1" x2="12" y2="23" />
                            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                        </svg>
                    </div>
                    <div>
                        <h3>Monthly Summary</h3>
                        <p class="rate-info" id="rate-info"></p>
                    </div>
                </div>
                <div class="grand-total-stats">
                    <div class="stat-item">
                        <span class="stat-label">Total Persons</span>
                        <span class="stat-value" id="total-persons">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Per Day Rate</span>
                        <span class="stat-value" id="per-day-rate">₹0</span>
                    </div>
                    <div class="stat-item highlight">
                        <span class="stat-label">Grand Total</span>
                        <span class="stat-value" id="grand-total">₹0</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Person Cards Container -->
        <section class="persons-container" id="persons-container">
            <!-- Person cards will be injected here -->
        </section>

        <!-- Empty State -->
        <section class="empty-state" id="empty-state">
            <div class="empty-icon">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                </svg>
            </div>
            <h2>No persons added yet</h2>
            <p>Add a person above to start tracking attendance</p>
        </section>
    </div>

    <!-- Month Picker Modal -->
    <div class="modal-overlay" id="month-picker-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Select Month</h3>
                <button class="modal-close" id="modal-close">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="year-nav">
                <button class="nav-arrow" id="year-prev">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6" />
                    </svg>
                </button>
                <span class="year-display" id="year-display"></span>
                <button class="nav-arrow" id="year-next">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6" />
                    </svg>
                </button>
            </div>
            <div class="month-grid" id="month-grid"></div>
        </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
</body>

</html>
